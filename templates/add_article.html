<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Article</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-xl rounded-2xl p-8 max-w-xl w-full">
      <h1 class="text-3xl font-bold mb-6 text-center text-blue-600">📝 Add New Article</h1>

      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold mb-1">Title</label>
          <input
            type="text"
            name="title"
            placeholder="Enter the title"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Content</label>
          <textarea
            name="content"
            placeholder="Write your article here..."
            required
            rows="6"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Author</label>
          <input
            type="text"
            name="author"
            placeholder="Author name"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none"
          />
        </div>

        <div class="text-center">
          <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-xl transition duration-200"
          >
            Submit Article
          </button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
