<!DOCTYPE html>
<html>
<head><title>{{ article.title }}</title></head>
<body>
  <h1>{{ article.title }}</h1>
  <p>{{ article.content }}</p>
  <h3>Comments</h3>
  {% for comment in comments %}
    <p>{{ comment.user }}: {{ comment.text }} ({{ comment.postDate.strftime('%Y-%m-%d') }})</p>
  {% endfor %}
  <form method="POST" action="{{ url_for('add_comment', articleID=article.articleID) }}">
    <input type="text" name="user" placeholder="Your name" required>
    <input type="text" name="text" placeholder="Your comment" required>
    <button type="submit">Add Comment</button>
  </form>
</body>
</html>
